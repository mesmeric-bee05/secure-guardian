name: Smoke Tests
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Start Vite dev server
        run: |
          bun run dev > /tmp/vite.log 2>&1 &
          echo $! > /tmp/vite.pid
      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:8080 > /dev/null; then
              echo "Dev server up"; exit 0
            fi
            sleep 1
          done
          echo "Dev server failed to start"; tail -n 100 /tmp/vite.log; exit 1
      - name: Run Playwright smoke tests
        run: bunx playwright test --config=playwright.smoke.config.ts
      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/vite.pid ]; then kill "$(cat /tmp/vite.pid)" || true; fi
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
