name: Security
on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Source secret scan
        run: node scripts/scan-secrets.mjs
      - name: Install deps
        run: npm install --no-audit --no-fund --prefer-offline
      - name: Build client
        run: npm run build
      - name: Bundle secret scan
        run: node scripts/scan-secrets.mjs --bundle
